spring.application.name=collaborateur-service
server.port=8081

# Eureka configuration
eureka.client.service-url.defaultZone=http://eureka-server:8761/eureka/
eureka.client.fetch-registry=true
eureka.client.register-with-eureka=true

# Feign configuration
feign.hystrix.enabled=true

# MySQL configuration
spring.datasource.url=jdbc:mysql://mysql:3306/collaborateur_database?createDatabaseIfNotExist=true&autoReconnect=true&useSSL=false&useUnicode=yes&useLegacyDatetimeCode=false&serverTimezone=UTC
spring.datasource.username=root12
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA/Hibernate configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.packagesToScan=net.atos.collaborateur.entity,net.atos.common.entity
